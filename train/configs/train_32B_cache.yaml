model: /leonardo_work/EUHPC_E04_042/BaseModels/Qwen3-VL-32B-Instruct
model_name: swift-bot
model_author: swift
system: "You are a helpful assistant."

train_type: full
torch_dtype: bfloat16
deepspeed: /leonardo/home/userexternal/laranaga/mLatxa/train/configs/train_32B_cache.yaml
attn_impl: flash_attention_2
packing: true
gradient_checkpointing: true
max_length: 8192
use_liger_kernel: true

# Hyperparameters
num_train_epochs: 4
per_device_train_batch_size: 1
gradient_accumulation_steps: 1

# Optimizer and Scheduler
warmup_ratio: 0.1
weight_decay: 0.1
adam_beta1: 0.9
adam_beta2: 0.95
adam_epsilon: 1e-8
lr_scheduler_type: cosine
learning_rate: 0.00001

# Should be 10813318240 llama tokens. It is 8187712460 qwen tokens
# Data Handling
cached_dataset: /leonardo_work/AIFAC_5C0_261/datasets/train/preprocessed/latxa_v2/qwen32b/train
split_dataset_ratio: 0
dataset_num_proc: 16
dataloader_num_workers: 4
load_from_cache_file: true

freeze_llm: false
freeze_vit: true
freeze_aligner: false
average_tokens_across_devices: true

output_dir: /leonardo_work/AIFAC_5C0_261/multimodalModels
save_strategy: steps
save_steps: 100
save_total_limit: 4
report_to: wandb
logging_steps: 5